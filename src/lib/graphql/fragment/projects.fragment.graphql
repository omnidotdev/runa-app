fragment Project on Project {
  rowId
  name
  slug
  description
  prefix
  isPublic
  projectColumnId
  columnIndex
  color
  allTasks: tasks {
    totalCount
  }
  completedTasks: tasks(filter: { column: { title: { equalTo: "Done" } } }) {
    totalCount
  }
  projectLinks(orderBy: ORDER_ASC) {
    nodes {
      rowId
      url
      title
      order
    }
  }
}
